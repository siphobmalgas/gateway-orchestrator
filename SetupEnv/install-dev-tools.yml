---
- name: Install DevOps Development Tools
  hosts: local
  become: yes

  vars:
    node_version: "20"

  tasks:

  - name: Update apt cache
    apt:
      update_cache: yes

  ########################################
  # Install Docker
  ########################################

  - name: Install Docker dependencies
    apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common
        - gnupg
      state: present

  - name: Add Docker GPG key
    shell: |
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg

  - name: Add Docker repository
    shell: |
      echo \
      "deb [arch=$(dpkg --print-architecture) \
      signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(lsb_release -cs) stable" \
      | tee /etc/apt/sources.list.d/docker.list > /dev/null

  - name: Update apt after Docker repo
    apt:
      update_cache: yes

  - name: Install Docker
    apt:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      state: present

  - name: Add user to docker group
    user:
      name: "{{ ansible_user_id }}"
      groups: docker
      append: yes

  ########################################
  # Install Node.js
  ########################################

  - name: Add NodeSource repository
    shell: |
      curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -

  - name: Install Node.js
    apt:
      name: nodejs
      state: present

  ########################################
  # Install VS Code
  ########################################

  - name: Install dependencies for VS Code
    apt:
      name:
        - wget
        - gpg
      state: present

  - name: Add Microsoft GPG key
    shell: |
      wget -qO- https://packages.microsoft.com/keys/microsoft.asc \
      | gpg --dearmor > packages.microsoft.gpg
      install -D -o root -g root -m 644 packages.microsoft.gpg \
      /etc/apt/keyrings/packages.microsoft.gpg

  - name: Add VS Code repository
    shell: |
      echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/packages.microsoft.gpg] \
      https://packages.microsoft.com/repos/code stable main" \
      | tee /etc/apt/sources.list.d/vscode.list

  - name: Update apt after VS Code repo
    apt:
      update_cache: yes

  - name: Install VS Code
    apt:
      name: code
      state: present
